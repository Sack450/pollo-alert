<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Alerta con imagen</title>
	<style>
		:root {
			--overlay-bg: rgba(0,0,0,0.6);
			--modal-bg: #fff;
			--accent: #0078d4;
		}
		body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; }

		/* Overlay y modal centrado */
		.overlay {
			position: fixed;
			inset: 0;
			background: var(--overlay-bg);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 9999;
		}
		.modal {
			background: var(--modal-bg);
			padding: 20px;
			border-radius: 8px;
			max-width: 90%;
			max-height: 90%;
			box-shadow: 0 10px 30px rgba(0,0,0,0.25);
			text-align: center;
			overflow: auto;
		}
		.modal h2 { margin: 0 0 12px; font-size: 1.25rem; }
		.modal p { margin: 0 0 16px; color: #333; }
		.modal img {
			display: block;
			margin: 0 auto 16px;
			max-width: 100%;
			max-height: 60vh;
			border-radius: 4px;
		}
		.btn {
			display: inline-block;
			padding: 8px 14px;
			background: var(--accent);
			color: #fff;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: 600;
		}
	</style>
</head>
<body>
	<!-- Modal que aparece al cargar -->
	<div id="alertOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="alertTitle">
		<div class="modal">
			<h2 id="alertTitle">Pollo alert</h2>
			<p>Pollo alert pollo alert.</p>

			<!-- Reemplaza "your-image.png" con la ruta/nombre de tu imagen -->
			<img id="centerImage" src="si.png" alt="Imagen de alerta" />

			<button id="closeBtn" class="btn" type="button">Cerrar</button>
		</div>
	</div>

	<script>
		// Muestra el modal al cargar (ya está visible por defecto en el HTML).
		// Cierra con el botón o con Escape.
		(function(){
			const overlay = document.getElementById('alertOverlay');
			const closeBtn = document.getElementById('closeBtn');

			function close() {
				if (!overlay) return;
				overlay.style.display = 'none';
			}

			closeBtn.addEventListener('click', close);
			window.addEventListener('keydown', (e) => {
				if (e.key === 'Escape') close();
			});

			// Si deseas cargar una imagen a través de un input en lugar de editar el HTML,
			// puedes descomentar y usar el siguiente bloque:
			/*
			const img = document.getElementById('centerImage');
			const fileInput = document.createElement('input');
			fileInput.type = 'file';
			fileInput.accept = 'image/*';
			fileInput.addEventListener('change', () => {
				const f = fileInput.files && fileInput.files[0];
				if (!f) return;
				img.src = URL.createObjectURL(f);
			});
			// para abrir diálogo de selección automáticamente:
			// fileInput.click();
			*/
		})();
	</script>
</body>
</html>
